<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perplexions</title>
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="toast-container"></div>
    <button id="credits-btn">?</button>
    <div id="credits-card" hidden>
      <h1>Credits</h1>
      <p>Designed and created by Fire.</p>
      <p>Thanks to Rose Thomas, Eric Tiano, Lexi Kovacs, and WalrusesAreAwesome for playtesting and suggestions.</p>
      <p>Rose also contributed a level.</p>
    </div>
    <div id="end-card" hidden>
      <h1>Level cleared!</h1>
      <div id="solution-hash"><span class="solution-hash-label">Solution hash</span><span id="solution-hash-emojis"></span></div>
      <button id="copy-results">Copy results</button>
      <button id="replay">Replay with hash shown</button>
      <button id="replay-no-hash">or without</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
